version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8080"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env
  
  ui:
    build: .
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env
    depends_on:
      - api